[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
evm_version = "cancun"
via_ir = true
optimizer = true
optimizer_runs = 44444444
ffi = true
gas_limit = "300000000"
bytecode_hash = "none"

